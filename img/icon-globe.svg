<svg width="60" height="60" viewBox="0 0 60 60" fill="none">
  <!-- Globe circle -->
  <circle cx="30" cy="30" r="20" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- Latitude lines -->
  <ellipse cx="30" cy="30" rx="20" ry="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <ellipse cx="30" cy="30" rx="20" ry="16" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- Longitude lines -->
  <ellipse cx="30" cy="30" rx="8" ry="20" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <ellipse cx="30" cy="30" rx="16" ry="20" stroke="currentColor" stroke-width="2.5" fill="none"/>
</svg>
